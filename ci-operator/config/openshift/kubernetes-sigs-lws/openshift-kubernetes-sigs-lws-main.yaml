base_images:
  ocp_builder_rhel-9-base-openshift-4.19:
    name: builder
    namespace: ocp
    tag: rhel-9-base-openshift-4.19
  ocp_builder_rhel-9-golang-1.23-openshift-4.19:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.23-openshift-4.19
build_root:
  from_repository: true
images:
- dockerfile_path: Dockerfile.ocp
  inputs:
    ocp_builder_rhel-9-base-openshift-4.19:
      as:
      - registry.redhat.io/rhel9-4-els/rhel-minimal:9.4
    ocp_builder_rhel-9-golang-1.23-openshift-4.19:
      as:
      - brew.registry.redhat.io/rh-osbs/openshift-golang-builder:rhel_9_1.23
  to: kubernetes-sigs-lws
promotion:
  to:
  - name: "4.19"
    namespace: ocp
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tag_specification:
  name: "4.19"
  namespace: ocp
tests:
- as: verify
  commands: make verify
  container:
    from: src
- as: test
  commands: make test
  container:
    from: src
- as: fips-image-scan-kubernetes-sigs-lws
  skip_if_only_changed: ^\.tekton/|\.md$|^(LICENSE|OWNERS)$
  steps:
    dependencies:
      SCAN_IMAGE: kubernetes-sigs-lws
    test:
    - ref: fips-check-image-scan
- as: security
  optional: true
  skip_if_only_changed: ^\.tekton/|\.md$|^(LICENSE|OWNERS)$
  steps:
    workflow: openshift-ci-security
zz_generated_metadata:
  branch: main
  org: openshift
  repo: kubernetes-sigs-lws
